<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tukios Admin — Aftercare Text Demo</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; -webkit-font-smoothing: antialiased; overflow: hidden; }

.app { display: flex; height: 100vh; }

/* ================================================
   SIDEBAR — Matching Tukios admin exactly
   ================================================ */
.sidebar {
  width: 210px; min-width: 210px; background: #1e293b;
  display: flex; flex-direction: column; height: 100vh;
}
.sidebar-logo {
  padding: 16px 14px; display: flex; align-items: center; justify-content: space-between; gap: 8px;
}
.logo-box {
  border: 1.5px solid rgba(255,255,255,0.3); border-radius: 4px;
  padding: 6px 10px; text-align: center;
}
.logo-top { font-size: 13px; font-weight: 700; color: #fff; letter-spacing: 2px; line-height: 1; }
.logo-div { height: 1px; background: rgba(255,255,255,0.3); margin: 3px 0; }
.logo-bot { font-size: 8px; font-weight: 600; color: rgba(255,255,255,0.8); letter-spacing: 3px; line-height: 1; }
.collapse-btn {
  background: none; border: none; color: rgba(255,255,255,0.5);
  font-size: 18px; cursor: pointer; padding: 4px;
}
.collapse-btn:hover { color: #fff; }

.sidebar-nav { flex: 1; padding: 4px 8px; }
.sidebar-bottom { padding: 4px 8px; }
.sidebar-sep { height: 1px; background: rgba(255,255,255,0.1); margin: 4px 20px; }

.nav-item {
  display: flex; align-items: center; gap: 10px; width: 100%;
  padding: 9px 12px; border: none; background: none;
  color: rgba(255,255,255,0.7); font-size: 14px; font-weight: 500;
  font-family: inherit; cursor: pointer; border-radius: 6px;
  transition: all 0.15s; text-align: left;
}
.nav-item:hover { background: rgba(255,255,255,0.08); color: #fff; }
.nav-item.active { background: rgba(56, 152, 236, 0.2); color: #fff; }
.nav-icon { display: flex; align-items: center; justify-content: center; width: 20px; flex-shrink: 0; }
.nav-label { flex: 1; white-space: nowrap; }
.nav-badge {
  font-size: 11px; font-weight: 600; padding: 1px 8px;
  border-radius: 10px; line-height: 18px; flex-shrink: 0;
}
.nav-badge.green { background: #22c55e; color: #fff; }
.nav-badge.red { background: #e74c3c; color: #fff; }
.nav-ext { color: rgba(255,255,255,0.4); display: flex; align-items: center; margin-left: auto; font-size: 11px; }

.sidebar-new {
  padding: 12px 20px; display: flex; align-items: center; gap: 8px;
  color: rgba(255,255,255,0.6); font-size: 13px; font-weight: 500;
  cursor: pointer; border-top: 1px solid rgba(255,255,255,0.08); margin-top: 8px;
}
.sidebar-new:hover { color: #fff; }

/* ================================================
   MAIN AREA
   ================================================ */
.main { flex: 1; display: flex; flex-direction: column; min-width: 0; }

/* Top bar */
.topbar {
  height: 56px; background: #fff; border-bottom: 1px solid #e2e6ec;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 24px; flex-shrink: 0;
}
.breadcrumb { display: flex; align-items: center; gap: 8px; font-size: 15px; }
.bc-org { font-weight: 500; color: #1a1a2e; }
.bc-sep { color: #ccc; }
.bc-page { font-weight: 600; color: #1a1a2e; }
.topbar-right { display: flex; align-items: center; gap: 16px; }
.topbar-avatar {
  width: 36px; height: 36px; border-radius: 50%; background: #1e293b;
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 12px; font-weight: 600; cursor: pointer;
}
.topbar-add {
  width: 40px; height: 40px; border-radius: 50%; background: #3b82f6;
  color: #fff; border: none; font-size: 24px; cursor: pointer;
  display: flex; align-items: center; justify-content: center; font-weight: 300;
}

/* Content area */
.content { flex: 1; background: #edf0f4; overflow-y: auto; }

/* Obituaries page */
.obit-page { padding: 20px 24px; }
.obit-search {
  width: 100%; padding: 10px 40px 10px 16px; border: 1px solid #dde1e8;
  border-radius: 6px; font-size: 14px; font-family: inherit; background: #fff; outline: none;
  margin-bottom: 16px;
}
.obit-toolbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.obit-count { font-size: 13px; color: #5a5d72; }
.obit-toolbar-r { display: flex; align-items: center; gap: 16px; }
.obit-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
.obit-card {
  background: #fff; border: 1px solid #e2e6ec; border-radius: 10px;
  padding: 20px 16px 12px; text-align: center; position: relative; cursor: pointer;
  transition: box-shadow 0.15s;
}
.obit-card:hover { box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
.obit-photo {
  width: 72px; height: 72px; border-radius: 50%; margin: 0 auto 10px;
  overflow: hidden; background: #e2e6ec; display: flex; align-items: center; justify-content: center;
  font-size: 20px; font-weight: 600; color: #8b8fa3;
}
.obit-name { font-size: 14px; font-weight: 600; color: #1a1a2e; margin-bottom: 2px; }
.obit-date { font-size: 12px; color: #8b8fa3; margin-bottom: 6px; }
.obit-status {
  display: inline-block; font-size: 11px; font-weight: 600;
  padding: 2px 10px; border-radius: 10px; margin-bottom: 12px;
}
.obit-status.published { color: #22c55e; background: #f0fdf4; }
.obit-status.draft { color: #eab308; background: #fefce8; }
.obit-pin { position: absolute; top: 10px; right: 14px; font-size: 16px; color: #f59e0b; }
.obit-pin.off { color: #ccc; }
.obit-dot { position: absolute; top: 12px; left: 14px; color: #e74c3c; font-size: 10px; }
.obit-foot { display: flex; align-items: center; justify-content: space-between; padding-top: 10px; border-top: 1px solid #f0f2f5; }
.obit-loc { font-size: 11px; color: #8b8fa3; }

/* Aftercare text page */
.aftercare-page { height: 100%; display: flex; flex-direction: column; }
#aftercare-text-root { flex: 1; height: 100%; }

/* Hide/show pages */
.page-hidden { display: none; }

/* Toggle select */
.loc-select {
  padding: 8px 32px 8px 12px; border: 1px solid #dde1e8; border-radius: 6px;
  font-size: 13px; font-family: inherit; background: #fff; cursor: pointer;
}
</style>
</head>

<script>
// ================================================================
// TUKIOS ADMIN SHELL — Navigation Logic
// ================================================================
const pageNames = {
  'dashboard':'Dashboard','obituaries':'Obituaries','audience':'Audience',
  'aftercare-text':'Aftercare Text','website-content':'Website Content',
  'users':'Users','events':'Events','reports':'Reports','proofs':'Proofs','settings':'Settings',
};

const obits = [
  { name:'kyle 3', date:'Dec 15, 9999', status:'Published', pin:true, dot:true },
  { name:'John Doe', date:'Mar 30, 2023', status:'Published', pin:true },
  { name:'Garrett Otto', date:'Oct 8, 2022', status:'Draft', pin:true },
  { name:'Joe Pistachio', date:'Sep 9, 9999', status:'Published' },
  { name:'John "J.D" Doe', date:'Feb 5, 3000', status:'Draft' },
  { name:'Morgan Test', date:'Aug 14, 3000', status:'Published' },
  { name:'Ferdinand J Vanderhoek', date:'Feb 2, 2250', status:'Draft' },
  { name:'Gracie Lou Hart', date:'Nov 16, 2122', status:'Draft' },
];

// Render obituary cards
document.getElementById('obit-grid').innerHTML = obits.map(o => `
  <div class="obit-card">
    ${o.dot ? '<span class="obit-dot">●</span>' : ''}
    <span class="obit-pin ${o.pin ? '' : 'off'}">${o.pin ? '★' : '☆'}</span>
    <div class="obit-photo">${o.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase()}</div>
    <div class="obit-name">${o.name}</div>
    <div class="obit-date">${o.date}</div>
    <div class="obit-status ${o.status.toLowerCase()}">${o.status}</div>
    <div class="obit-foot"><span class="obit-loc">Sonzini Mortuary - Ogden</span></div>
  </div>
`).join('');

// Navigation
let currentPage = 'obituaries';
document.querySelectorAll('.nav-item[data-page]').forEach(btn => {
  btn.addEventListener('click', () => {
    const page = btn.dataset.page;
    if (page === currentPage) return;

    // Update nav active state
    document.querySelectorAll('.nav-item[data-page]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');

    // Update breadcrumb
    document.getElementById('bc-page').textContent = pageNames[page] || page;

    // Show/hide pages
    document.getElementById('page-obituaries').classList.add('page-hidden');
    document.getElementById('page-aftercare-text').classList.add('page-hidden');
    document.getElementById('page-placeholder').classList.add('page-hidden');

    // Top bar extras
    document.getElementById('topbar-extra').innerHTML = '';

    if (page === 'obituaries') {
      document.getElementById('page-obituaries').classList.remove('page-hidden');
      document.getElementById('topbar-extra').innerHTML = '<button class="topbar-add">+</button>';
    } else if (page === 'aftercare-text') {
      document.getElementById('page-aftercare-text').classList.remove('page-hidden');
    } else {
      document.getElementById('page-placeholder').classList.remove('page-hidden');
      document.getElementById('placeholder-title').textContent = pageNames[page] || page;
    }

    currentPage = page;
  });
});

// Set initial state
document.getElementById('topbar-extra').innerHTML = '<button class="topbar-add">+</button>';
</script>

<!--
  ============================================================
  AFTERCARE TEXT WIDGET — This is the script from aftercare.com
  In production, this <script> tag is the ONLY thing Tukios adds.
  Everything above is their existing admin.
  ============================================================
-->
<script>
(function () {
  'use strict';

  function init() {
    const root = document.getElementById('aftercare-text-root');
    if (!root) return;
    render(root);
  }

  function render(root) {
    if (root.dataset.aftercareInit) return;
    root.dataset.aftercareInit = 'true';
    const styleEl = document.createElement('style');
    styleEl.textContent = getStyles();
    document.head.appendChild(styleEl);
    root.innerHTML = getHTML();
    bindEvents(root);
    updateNavBadge(2);
  }

  function updateNavBadge(count) {
    const badge = document.getElementById('aftercare-text-nav-badge');
    if (badge) {
      if (count > 0) { badge.textContent = count; badge.style.display = 'inline-block'; }
      else { badge.style.display = 'none'; }
    }
  }

  function getStyles() {
    const S = '#aftercare-text-root';
    return `
${S} { font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif; display: flex; flex-direction: column; height: 100%; color: #1a1a2e; }
${S} * { margin: 0; padding: 0; box-sizing: border-box; }
${S} .ac-topbar { display: flex; align-items: center; justify-content: space-between; padding: 12px 24px; background: #fff; border-bottom: 1px solid #e2e6ec; flex-shrink: 0; }
${S} .ac-topbar-left { font-size: 18px; font-weight: 700; color: #1a1a2e; }
${S} .ac-topbar-settings { font-size: 13px; font-weight: 500; color: #4a6cf7; text-decoration: none; padding: 7px 14px; border: 1px solid #dde1e8; border-radius: 6px; transition: all 0.15s; }
${S} .ac-topbar-settings:hover { border-color: #4a6cf7; background: #f0f3ff; }
${S} .ac-inbox { display: flex; flex: 1; overflow: hidden; }
${S} .ac-list { width: 300px; min-width: 300px; background: #fff; border-right: 1px solid #e2e6ec; display: flex; flex-direction: column; }
${S} .ac-list-msgs { flex: 1; overflow-y: auto; }
${S} .ac-group-hdr { padding: 10px 16px; font-size: 11px; font-weight: 600; color: #c0392b; text-transform: uppercase; letter-spacing: 0.5px; background: #fef8f7; border-bottom: 1px solid #fde8e5; display: flex; align-items: center; gap: 6px; }
${S} .ac-group-count { font-size: 10px; background: #e74c3c; color: #fff; padding: 1px 6px; border-radius: 8px; font-weight: 700; }
${S} .ac-divider { height: 1px; background: #dde1e8; margin: 12px 16px; }

${S} .ac-cancel-btn { background: #f0f2f5; color: #5a5d72; }
${S} .ac-stop-btn { background: #e74c3c; color: #fff; }
`;
  }

  function getHTML() {
    return `

    <div class="ac-divider"></div>
    <div class="ac-msg" data-id="sarah"><div class="ac-msg-ind"></div><div class="ac-msg-body"><div class="ac-msg-top"><span class="ac-msg-name">Sarah Johnson</span><span class="ac-msg-date">Yesterday</span></div><div class="ac-msg-preview">Thank you 🙏</div></div></div>
    <div class="ac-msg" data-id="patricia"><div class="ac-msg-ind"></div><div class="ac-msg-body"><div class="ac-msg-top"><span class="ac-msg-name">Patricia Davis</span><span class="ac-msg-date">Feb 14</span></div><div class="ac-msg-preview">That means so much. God bless you all.</div></div></div>
  </div></div>
  <div class="ac-convo">
    <div class="ac-convo-hdr"><div><div class="ac-convo-name">Margaret Williams</div><div class="ac-convo-phone">910-555-0147</div></div><div class="ac-convo-sep"></div><div><div class="ac-convo-dec">Robert Williams</div><div class="ac-convo-ddate">d. 1/2/2026</div></div></div>
    <div class="ac-msgs">
      <div class="ac-sys">30-day Check-up</div>
      <div class="ac-bubble out">Hello Margaret, this is Sonzini Mortuary and we wanted to thank you for allowing us to serve your family during this difficult time. If there is anything we can do for you, now or in the future, please let us know.<div class="ac-meta">Feb 3</div></div>
      <div class="ac-sys">Holiday Message</div>
      <div class="ac-bubble out">Wishing you a peaceful holiday season and a blessed new year. The staff at Sonzini Mortuary.<div class="ac-meta">Dec 10</div></div>

  <div class="ac-detail">
    <div><h4>Message Schedule</h4>

      <div class="ac-sched sent" data-msg="review"><span class="ac-sched-check">✓</span><span class="ac-sched-name">Google Review</span><span class="ac-sched-date">Feb 18</span></div>

<div class="ac-modal-bg" id="ac-stop-modal"><div class="ac-confirm"><h3>Stop Messages for Margaret Williams?</h3><p>This will cancel all future scheduled text messages for this family and suppress their phone number from receiving any further texts.</p><div class="ac-confirm-warn">⚠️ This action cannot be undone.</div><p style="font-size:13px;">Remaining scheduled messages that will be cancelled:</p><div style="font-size:13px;color:#1a1a2e;margin-top:4px;padding-left:8px;"><div style="margin-bottom:3px;">• Birthday Message (Mar 15)</div><div style="margin-bottom:3px;">• Holiday Message (Dec 10)</div><div>• 1st Anniversary (Jan 2)</div></div><div class="ac-confirm-acts"><button class="ac-cancel-btn" id="ac-stop-cancel">Cancel</button><button class="ac-stop-btn" id="ac-stop-confirm">Stop All Messages</button></div></div></div>
`;
  }

  function bindEvents(root) {
    const msgData = {
      '30day': { title: '30-day Check-up', timing: 'Sent 2/3/26 2:00 PM', sent: true, text: 'Hello Margaret, this is Sonzini Mortuary and we wanted to thank you for allowing us to serve your family during this difficult time. If there is anything we can do for you, now or in the future, please let us know.' },
      'review': { title: 'Google Review', timing: 'Sent 2/18/26 2:00 PM', sent: true, text: 'Hi Margaret, all of us at Sonzini Mortuary are dedicated to providing excellent service to our families. One way we measure how we are doing is by asking our families to answer a few short questions about our service. Would you mind doing that? It would only take a few minutes. Thank you!' },
      'birthday': { title: 'Birthday Message', timing: 'Scheduled for Mar 15', sent: false, text: 'Hi Margaret, we understand how meaningful and yet difficult the birthday of your loved one can be, so please know we are thinking about you today.\n\nThe staff at Sonzini Mortuary' },
      'holiday': { title: 'Holiday Message', timing: 'Scheduled for Dec 10', sent: false, text: 'Wishing you a peaceful holiday season and a blessed new year.\n\nThe staff at Sonzini Mortuary' },
      'anniversary': { title: 'First Anniversary', timing: 'Scheduled for Jan 2', sent: false, text: 'Please know that you are being remembered on this day and that all of us at Sonzini Mortuary are thinking of you.' }
    };

    root.querySelectorAll('.ac-sched').forEach(item => {
      item.addEventListener('click', () => {
        const d = msgData[item.dataset.msg]; if (!d) return;
        root.querySelector('#ac-modal-title').textContent = d.title;
        root.querySelector('#ac-modal-timing').textContent = d.timing;
        root.querySelector('#ac-modal-msg').textContent = d.text;
        root.querySelector('#ac-modal-del').style.display = d.sent ? 'none' : 'inline-block';
        root.querySelector('#ac-msg-modal').classList.add('visible');
      });
    });

    root.querySelector('#ac-modal-close-btn').addEventListener('click', () => root.querySelector('#ac-msg-modal').classList.remove('visible'));
    root.querySelector('#ac-modal-done-btn').addEventListener('click', () => root.querySelector('#ac-msg-modal').classList.remove('visible'));
    root.querySelector('#ac-msg-modal').addEventListener('click', e => { if (e.target.id === 'ac-msg-modal') root.querySelector('#ac-msg-modal').classList.remove('visible'); });

    root.querySelector('#ac-stop-link').addEventListener('click', () => root.querySelector('#ac-stop-modal').classList.add('visible'));
    root.querySelector('#ac-stop-cancel').addEventListener('click', () => root.querySelector('#ac-stop-modal').classList.remove('visible'));
    root.querySelector('#ac-stop-modal').addEventListener('click', e => { if (e.target.id === 'ac-stop-modal') root.querySelector('#ac-stop-modal').classList.remove('visible'); });

    root.querySelector('#ac-stop-confirm').addEventListener('click', () => {
      root.querySelector('#ac-stop-modal').classList.remove('visible');
      const bar = root.querySelector('#ac-reply-bar');
      bar.className = 'ac-reply suppressed';
      bar.innerHTML = '<div class="ac-suppressed"><span class="ac-suppressed-icon">🚫</span><div>This family no longer wants to receive messages. Their number has been suppressed and all future messages have been cancelled.</div></div>';
      root.querySelector('#ac-stop-wrap').style.display = 'none';
      root.querySelectorAll('.ac-sched:not(.sent)').forEach(i => { i.style.opacity='0.35'; i.style.textDecoration='line-through'; i.style.pointerEvents='none'; });
    });

    root.querySelectorAll('.ac-dismiss').forEach(link => {
      link.addEventListener('click', e => {
        e.stopPropagation();
        const msg = link.closest('.ac-msg');
        if (msg) { msg.style.transition='opacity 0.3s'; msg.style.opacity='0'; setTimeout(() => msg.remove(), 300); }
      });
    });
  }

  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
  else init();

  const obs = new MutationObserver(() => {
    const root = document.getElementById('aftercare-text-root');
    if (root && !root.dataset.aftercareInit) init();
  });
  obs.observe(document.body, { childList: true, subtree: true });
})();
</script>
